<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>产品经理面试前 1 小时急救包</title>
  <style>
    :root { color-scheme: light; --ink:#172033; --muted:#667085; --brand:#5b5ff7; --bg:#f6f7fb; --card:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:linear-gradient(135deg,#f6f7fb,#eef1ff); color:var(--ink); }
    main { max-width: 920px; margin: 0 auto; padding: 72px 24px; }
    .hero { background:rgba(255,255,255,.82); border:1px solid rgba(91,95,247,.12); border-radius:28px; padding:48px; box-shadow:0 24px 80px rgba(20,25,60,.10); }
    .tag { display:inline-flex; padding:8px 12px; border-radius:999px; background:#eef0ff; color:var(--brand); font-weight:700; font-size:14px; }
    h1 { font-size: clamp(36px, 6vw, 68px); line-height:1.02; margin:24px 0 18px; letter-spacing:-.05em; }
    p { font-size:20px; line-height:1.65; color:var(--muted); margin:0 0 26px; }
    .actions { display:flex; flex-wrap:wrap; gap:14px; margin-top:30px; }
    a { color:inherit; }
    .btn { text-decoration:none; padding:14px 18px; border-radius:14px; font-weight:800; }
    .primary { background:var(--brand); color:white; }
    .secondary { background:#fff; border:1px solid #d9ddf8; color:var(--brand); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-top:24px; }
    .card { background:var(--card); border:1px solid #e8eaf7; border-radius:18px; padding:20px; color:var(--muted); line-height:1.5; }
    .card strong { display:block; color:var(--ink); margin-bottom:6px; }
    code { background:#f0f2f8; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <span class="tag">Skill</span>
      <h1>产品经理面试前 1 小时急救包</h1>
      <p>一个产品经理面试前 1 小时急救包 skill：输入简历和 JD，输出定制化面试作战文档，帮助候选人拆解岗位意图、提炼王牌经历、准备高频问题和风险防守。</p>
      <div class="actions">
        <a class="btn primary" href="./pm-interview-1h-rescue.skill">下载 .skill</a>
        <a class="btn secondary" href="https://github.com/zebrazjx/pm-interview-1h-rescue">查看 GitHub</a>
      </div>
      <div class="grid">
        <div class="card"><strong>输入</strong>简历 + 目标岗位 JD，可选公司名、轮次、剩余时间和担心问题。</div>
        <div class="card"><strong>输出</strong>JD 招聘意图、匹配矩阵、三张王牌经历、自我介绍、高频问答、case 框架。</div>
        <div class="card"><strong>模式</strong>支持 60 / 30 / 15 分钟不同急救节奏，并强制生成最后 10 分钟速记页。</div>
      </div>
      <p style="margin-top:32px;font-size:15px;">Built with <a href="https://www.verdent.ai">Verdent</a>.</p>
    </section>
  </main>
</body>
</html>
